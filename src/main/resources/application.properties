spring.application.name=warehouse-service
server.servlet.context-path=/api/v1
server.port=${PORT:8082}

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/grainflow_warehouse}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.open-in-view=false

# Pageable prevents huge page sizes and invalid sort fields from causing 500s
spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.default-page-size=20

# Flyway enabled by default, overridden per profile
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Internal service URLs
auth.service.url=${AUTH_SERVICE_URL:http://localhost:8081}

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Actuator
management.endpoints.web.exposure.include=health,info
