# Flyway manages schema in prod Hibernate must NOT touch DDL
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

# No SQL logging in prod bad for performance and leaks query structure
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Don't expose DB/disk details to anonymous requests
management.endpoint.health.show-details=when-authorized

# Disabled in prod no need to expose API docs publicly
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Logging
logging.level.root=WARN
logging.level.com.grainflow=INFO
